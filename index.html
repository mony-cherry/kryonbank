<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>KryonBank</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <!-- LOGIN -->
    <div id="login" class="screen active">
           <div class="logo-container">
        <img src="./images/logokryonbank.png" class="logo">
        </div>
        <input id="loginNombre" placeholder="Usuario">
        <input id="loginClave" type="password" placeholder="PIN">
        <button onclick="login()">Entrar</button>
        <button onclick="mostrarRegistro()">Crear cuenta</button>
        <div class="msg" id="msgLogin"></div>
    </div>

    <!-- REGISTRO -->
    <div id="registro" class="screen">
        <h2>Registro</h2>
        <input id="regNombre" placeholder="Usuario">
        <input id="regClave" type="password" maxlength="4" placeholder="PIN">
        <input id="regSaldo" type="number" placeholder="Saldo inicial">
        <button onclick="registrar()">Registrarse</button>
        <button onclick="mostrarLogin()">Volver</button>
        <div class="msg" id="msgRegistro"></div>
    </div>

    <!-- APP -->
    <div id="app" class="screen">
        <h2 id="saludo"></h2>

        <div class="saldo-box">
            <p>Saldo disponible</p>
            <h1 id="saldo"></h1>
            <button class="eye" onclick="toggleSaldo()">👁️</button>
        </div>

        <div class="acciones">
            <button onclick="mostrarInput('consignar')">Consignar</button>
            <button onclick="mostrarInput('retirar')">Retirar</button>
            <button onclick="mostrarInput('transferir')">Transferir</button>
            <button onclick="verMovimientos()">Movimientos</button>
        </div>

        <div id="operacionBox" class="hidden">
            <input id="monto" type="number" placeholder="Ingrese monto">
            <button id="btnAccion"></button>
        </div>

        <button class="salir" onclick="cerrarSesion()">Salir</button>

        <!-- SCROLL AQUÍ -->
        <div id="pantalla"></div>
    </div>

</div>

<script src="script.js"></script>
</body>
<div id="toast"></div>
</html>
